server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache immutable assets (hashed filenames from Vite)
    location ~* \.(js|css|woff2|png|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker must not be cached
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # manifest.json – short cache
    location = /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Proxy API to backend
    # Use Docker's internal DNS resolver so the hostname is resolved at
    # request time, not at Nginx startup (avoids "host not found" crash).
    resolver 127.0.0.11 valid=30s;
    location /api/ {
        set $backend http://backend:3000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
